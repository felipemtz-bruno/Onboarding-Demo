info:
  name: Get Cat copy
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrlCat}}/images/search?limit=1"
  headers:
    - name: x-api-key
      value: YOUR-API-KEY
    - name: Accept
      value: application/json
  params:
    - name: size
      value: med
      type: query
      description: "[optional] thumb , small, med or full - small is perfect for Discord"
      disabled: true
    - name: mime_types
      value: jpg
      type: query
      description: "[optional] a comma separated string of types to return e.g. jpg,png for static, or gif for gifs"
      disabled: true
    - name: format
      value: json
      type: query
      description: "[optional] json | src"
      disabled: true
    - name: has_breeds
      value: "true"
      type: query
      description: "[optional] - only return images with breed data"
      disabled: true
    - name: order
      value: RANDOM
      type: query
      description: "[optional] default:RANDOM - RANDOM | ASC | DESC"
      disabled: true
    - name: page
      value: "0"
      type: query
      description: "[optional] paginate through results"
      disabled: true
    - name: limit
      value: "1"
      type: query
      description: "[optional] number of results to return, up to 25 with a valid API-Key"
  auth:
    type: apikey
    key: X-API-KEY
    value: "{{apiKeyCat}}"
    placement: header

runtime:
  scripts:
    - type: after-response
      code: bru.setNextRequest(null);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK
    request:
      url: "{{baseUrl}}/images/search?size=med&mime_types=jpg&format=json&has_breeds=true&order=RANDOM&page=0&limit=1"
      method: GET
      headers:
        - name: x-api-key
          value: YOUR-API-KEY
        - name: Accept
