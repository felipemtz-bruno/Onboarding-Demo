opencollection: 1.0.0
info:
  name: Dog or Cat Picture Randomizer
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: CAT API KEY ENV
      variables:
        - name: apiKeyDog
          value: live_FP557BveZN22K1SVubsNK5ziogLwCD1aMbKMEZ9tcUSu03B8dnGq9BJf7EhYIDbD
        - name: baseUrlCat
          value: http://api.thecatapi.com/v1
        - name: baseUrlDog
          value: https://api.thedogapi.com/v1
        - name: apiKeyCat
          value: live_PN8y60vulArIzQH7G0qtdhbUpnPhNT0xlEMd4Bzd7jcPHoJRovPH64htDftlaSdA
items:
  - info:
      name: Get Cat
      type: http
      seq: 2
    http:
      method: GET
      url: '{{baseUrlCat}}/images/search?limit=1'
      headers:
        - name: x-api-key
          value: YOUR-API-KEY
        - name: Accept
          value: application/json
      params:
        - name: size
          value: med
          type: query
          description: '[optional] thumb , small, med or full - small is perfect for Discord'
          disabled: true
        - name: mime_types
          value: jpg
          type: query
          description: '[optional] a comma separated string of types to return e.g. jpg,png for static, or gif for gifs'
          disabled: true
        - name: format
          value: json
          type: query
          description: '[optional] json | src'
          disabled: true
        - name: has_breeds
          value: 'true'
          type: query
          description: '[optional] - only return images with breed data'
          disabled: true
        - name: order
          value: RANDOM
          type: query
          description: '[optional] default:RANDOM - RANDOM | ASC | DESC'
          disabled: true
        - name: page
          value: '0'
          type: query
          description: '[optional] paginate through results'
          disabled: true
        - name: limit
          value: '1'
          type: query
          description: '[optional] number of results to return, up to 25 with a valid API-Key'
      auth:
        type: apikey
        key: X-API-KEY
        value: '{{apiKeyCat}}'
        placement: header
    runtime:
      scripts:
        - type: after-response
          code: bru.setNextRequest(null);
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
    docs: |-
      Searches or returns Random selection from all approved images. Default is to return RANDOM images, but with an API-Key you can use 'order=DESC' or 'order=ASC' along with the 'page' and 'limit' parameters to paginate through them in the order they were approved.

      Pagination-Count, Pagination-Page, and Pagination-Limit headers are present in the response so you know the total number of images that can be paginated through for the passed search filters.
    examples:
      - name: OK
        request:
          url: '{{baseUrl}}/images/search?size=med&mime_types=jpg&format=json&has_breeds=true&order=RANDOM&page=0&limit=1'
          method: GET
          headers:
            - name: x-api-key
              value: YOUR-API-KEY
            - name: Accept
              value: application/json
            - name: X-API-KEY
              value: <API Key>
          params:
            - name: size
              value: med
              type: query
              description: '[optional] thumb , small, med or full - small is perfect for Discord'
            - name: mime_types
