info:
  name: Randomizer
  type: http
  seq: 1

http:
  method: GET
  url: https://postman-echo.com/get
  body:
    type: json
    data: |-
      {
      "User": "{{statementVar}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const requests = ["Get Cat", "Get Dog"];
        const chosen = requests[Math.floor(Math.random() * requests.length)];
        console.log("Randomly selected: " + chosen);
        bru.runner.setNextRequest(chosen);

        const User = 'Bruno the Dog';

        //const User = bru.interpolate('{{$randomFullName}}');

        bru.setVar('statementVar', User);

        //console.log('user:' , User);
    - type: tests
      code: |-
        //test("status is 200", function () {
          //expect(res.getStatus()).to.equal(200);
        //});
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
